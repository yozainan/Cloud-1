---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-docker
      - certbot
    state: present

- name: Setup Docker keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create data directories
  ansible.builtin.file:
    path: /home/{{ user_login }}/data/{{ item }}
    state: directory
    mode: '0755'
  loop:
    - certbot_webroot
    - wordpress_data
    - mariadb_data

- name: Ensure project directory exists
  ansible.builtin.file:
    path: "/root/cloud-1/srcs"
    state: directory
    mode: '0755'

- name: Copy static payload to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../srcs/"
    dest: "/root/cloud-1/srcs/"
    mode: preserve
  notify: Rebuild Docker images

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/root/cloud-1/srcs/docker-compose.yml"
